name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Verify SONAR_HOST_URL Secret
        run: |
          echo "SONAR_HOST_URL=${{ secrets.SONAR_HOST_URL }}"

      - name: Verify SONAR_TOKEN Exists
        run: |
          if [ -z "${{ secrets.SONAR_TOKEN }}" ]; then
            echo "SONAR_TOKEN is NOT set"
            exit 1
          else
            echo "SONAR_TOKEN is set"
          fi

      - name: Build with Maven
        run: mvn -B clean package --file pom.xml

      - name: Test SonarQube URL
        run: |
          curl -v "${{ secrets.SONAR_HOST_URL }}" || true

      - name: SonarQube Analysis
        run: |
          mvn clean verify sonar:sonar \
            -Dsonar.projectKey=currency-conversion-service \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}