name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B package --file pom.xml

      - name: SonarQube Analysis
        run: echo "SonarQube analysis would run here"
      - name: Print Sonar URL
        run: echo "${{ secrets.SONAR_HOST_URL }}"
      - name: SonarQube2 Analysis
        run: |
          mvn clean verify sonar:sonar \
            -Dsonar.projectKey=currency-conversion-service \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}

      - name: Pawan Analysis
        run: echo "Pawan analysis would run here"